<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CFIE — 로그인</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;600&display=swap">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">
<div class="auth-card">
  <div class="auth-logo">
    <span class="logo-text">CFIE</span><span class="logo-ver">v4.0</span>
  </div>
  <p class="auth-tagline">차트 첫인상 엔진</p>
  <p class="auth-sub">GitHub 계정으로 로그인합니다</p>

  <div class="pat-steps">
    <div class="pat-step">
      <span class="step-num">1</span>
      <span>아래 링크에서 토큰을 생성합니다 <em>(gist 스코프만 체크)</em></span>
    </div>
    <a class="pat-link" href="https://github.com/settings/tokens/new?scopes=gist&description=CFIE" target="_blank" rel="noopener">
      github.com/settings/tokens → Generate new token (classic) →
    </a>
    <div class="pat-step">
      <span class="step-num">2</span>
      <span>생성된 토큰 <code>ghp_xxxx…</code> 를 아래에 붙여넣습니다</span>
    </div>
  </div>

  <div class="pat-input-wrap">
    <input id="patInput" type="password" class="pat-input" placeholder="ghp_xxxxxxxxxxxxxxxx" autocomplete="off">
    <button id="showBtn" class="show-btn" onclick="toggleShow()">표시</button>
  </div>

  <button id="loginBtn" class="login-btn" onclick="doLogin()">GitHub로 로그인</button>
  <div id="authError" class="auth-error hidden"></div>
</div>

<script type="module">
  import { isLoggedIn, loginWithPAT } from "./js/auth.js";
  if (isLoggedIn()) window.location.replace("dashboard.html");

  window.toggleShow = function() {
    const inp = document.getElementById("patInput");
    const btn = document.getElementById("showBtn");
    inp.type = inp.type === "password" ? "text" : "password";
    btn.textContent = inp.type === "password" ? "표시" : "숨김";
  };

  window.doLogin = async function() {
    const token  = document.getElementById("patInput").value.trim();
    const btn    = document.getElementById("loginBtn");
    const errEl  = document.getElementById("authError");
    errEl.classList.add("hidden");
    if (!token) { errEl.textContent = "토큰을 입력해주세요."; errEl.classList.remove("hidden"); return; }
    btn.disabled = true; btn.textContent = "로그인 중…";
    try {
      await loginWithPAT(token);
      window.location.href = "dashboard.html";
    } catch(e) {
      errEl.textContent = e.message;
      errEl.classList.remove("hidden");
      btn.disabled = false; btn.textContent = "GitHub로 로그인";
    }
  };

  document.getElementById("patInput").addEventListener("keydown", e => {
    if (e.key === "Enter") window.doLogin();
  });
</script>
</body>
</html>
