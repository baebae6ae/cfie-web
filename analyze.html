<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CFIE v4.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/analyze.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">
    <a href="index.html" class="logo" style="text-decoration:none">CFIE</a>
    <span class="ver">v4.0</span>
  </div>
  <nav class="topbar-nav">
    <a href="index.html"  class="nav-link" data-page="index.html">대시보드</a>
    <a href="scan.html"   class="nav-link" data-page="scan.html">신규 진입 종목 찾기</a>
  </nav>
  <div class="topbar-search">
    <form class="search-form" onsubmit="return false;">
      <input type="text" id="searchInput" class="search-input"
             placeholder="종목명 또는 티커 검색…" autocomplete="off">
      <button type="button" class="search-btn" onclick="doSearch()">⌕</button>
    </form>
    <div id="searchDropdown" class="search-dropdown hidden"></div>
  </div>
</header>

<!-- 로딩 -->
<div id="loadingOverlay" class="loading-overlay" style="display:flex">
  <div class="spinner"></div>
  <p style="margin-top:16px;color:var(--text2)">차트 데이터 분석 중…</p>
</div>

<main id="analyzeMain" style="display:none">

  <!-- 종목 헤더 -->
  <div class="stock-header">
    <div class="sh-left">
      <div class="sh-name" id="stockName">—</div>
      <div class="sh-meta">
        <span id="stockTicker"></span>
        <span id="stockExchange"></span>
        <span id="stockMeta"></span>
      </div>
      <div class="sh-price-row">
        <span class="sh-price"    id="stockPrice"></span>
        <span class="sh-currency" id="stockCurrency"></span>
        <span class="sh-daychg"   id="stockDayChg"></span>
      </div>
    </div>
    <div class="sh-right">
      <div id="fisBadge"  class="fis-badge">FIS —</div>
      <div id="labelChip" class="label-chip">—</div>
    </div>
  </div>

  <!-- 차트 기간 선택 -->
  <div class="chart-controls">
    <span class="chart-controls-title">차트 분석 기간</span>
    <select id="timeframeSelect" class="period-select" onchange="reloadChart()">
      <option value="1d" selected>일봉</option>
      <option value="1wk">주봉</option>
      <option value="1mo">월봉</option>
    </select>
    <select id="periodSelect" class="period-select" onchange="reloadChart()">
      <option value="6mo">6개월</option>
      <option value="1y">1년</option>
      <option value="2y" selected>2년</option>
      <option value="5y">5년</option>
    </select>
    <button class="back-btn" onclick="history.back()">← 뒤로</button>
  </div>

  <!-- 차트 + 사이드바 (2-컬럼) -->
  <div class="analyze-body">

    <!-- 왼쪽: 차트 -->
    <div class="chart-col">
      <div id="chartStage" class="chart-stage">
        <div id="mainChartEl" class="main-chart" style="height:500px;width:100%"></div>
        <div id="volChartEl"  class="vol-chart"  style="height:120px;width:100%;margin-top:4px"></div>
        <div id="macdChartEl" class="vol-chart" style="height:100px;width:100%;margin-top:4px"></div>
      </div>
    </div>

    <!-- 오른쪽: 사이드바 -->
    <div class="sidebar-col">

      <!-- CFIE 종합 판단 -->
      <div class="sidebar-box">
        <div class="sbox-header">📊 CFIE 종합 판단</div>
        <div class="sbox-body">
          <p id="judgeL1" class="jc-l1"></p>
          <p id="judgeL2" class="jc-l2"></p>
        </div>
        <div id="scoreBars" class="score-bars"></div>
      </div>

      <!-- 진입 타이밍 분석 -->
      <div class="sidebar-box">
        <div class="sbox-header">🎯 진입 타이밍 분석</div>
        <div class="entry-score-row">
          <span class="entry-score-label">진입 점수</span>
          <div class="entry-score-badge" id="entryScoreBadge">—</div>
        </div>
        <div class="entry-status" id="entryStatus"></div>
        <div class="entry-metrics" id="entryMetrics"></div>
      </div>

      <!-- 주요 지표 -->
      <div class="sidebar-box">
        <div class="sbox-header">📈 주요 지표</div>
        <div id="indicatorChips" class="chip-grid"></div>
      </div>

      <!-- 손절 분석 -->
      <div class="sidebar-box">
        <div class="sbox-header">✂ 손절 분석</div>
        <div class="avg-cost-section">
          <div class="avg-cost-row">
            <label class="avg-cost-label">평단가</label>
            <input type="number" id="avgCostInput" class="avg-cost-input"
                   placeholder="예: 85000" min="0" step="1"
                   oninput="onAvgCostChange()">
          </div>
          <div class="stop-loss-result">
            <div class="sl-item sl-ts-item">
              <span class="sl-key">트레일링 손절</span>
              <span class="sl-val" id="slPrice">—</span>
              <span class="sl-pct" id="slPct"></span>
            </div>
            <div class="sl-item">
              <span class="sl-key">EMA20</span>
              <span class="sl-val" id="slEMA20">—</span>
              <span class="sl-sig" id="slEMASignal"></span>
            </div>
            <div class="sl-desc">최근 20봉 고점 − ATR(14)×2 기준</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- 데이터 테이블 -->
  <div class="table-wrap">
    <div class="table-title">📋 최근 30일 데이터</div>
    <div style="overflow-x:auto">
      <table class="data-table">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

</main>

<div id="toast" class="toast"></div>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="js/yahoo.js"></script>
<script src="js/indicators.js"></script>
<script src="js/common.js"></script>
<script src="js/analyze.js"></script>
</body>
</html>
