<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CFIE — 마이 페이지</title>
<script>if(!localStorage.getItem("cfie_gh_token"))window.location.replace("login.html");</script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="css/common.css"><link rel="stylesheet" href="css/mypage.css">
</head>
<body>
<header class="topbar">
  <div class="topbar-brand">
    <a href="dashboard.html" style="text-decoration:none">
      <span class="logo">CFIE</span><span class="ver">v4.0</span>
    </a>
  </div>
  <nav class="topbar-nav">
    <a href="dashboard.html" class="nav-link">대시보드</a>
    <a href="scan.html"      class="nav-link">종목 찾기</a>
    <a href="analyze.html"   class="nav-link">차트 분석</a>
    <a href="mypage.html"    class="nav-link">마이 페이지</a>
  </nav>
  <div class="topbar-search">
    <form class="search-form" onsubmit="return false;">
      <input type="text" id="searchInput" class="search-input" placeholder="종목명 또는 티커 검색…" autocomplete="off">
    </form>
    <div id="searchDropdown" class="search-dropdown hidden"></div>
  </div>
  <div class="topbar-user">
    <img id="userAvatar" class="user-avatar" src="" alt="" style="display:none">
    <span id="userName" class="user-name"></span>
    <button id="logoutBtn" class="logout-btn">로그아웃</button>
  </div>
</header>
<div class="ticker-strip"><div class="ticker-track" id="tickerTrack">
  <div class="ticker-item"><span class="ti-name">시장 데이터 로딩 중…</span></div>
</div></div>
<main class="main-content">
  <div class="mp-header">
    <h1 class="mp-title">마이 포트폴리오</h1>
    <button class="mp-add-btn" onclick="openAddModal()">+ 종목 추가</button>
  </div>
  <div id="portfolioSummary" class="portfolio-summary hidden">
    <div class="ps-card"><div class="ps-label">총 평가금액</div><div id="psTotalVal"  class="ps-val"></div></div>
    <div class="ps-card"><div class="ps-label">총 수익률</div>  <div id="psTotalPnl"  class="ps-val"></div></div>
    <div class="ps-card"><div class="ps-label">평균 FIS</div>   <div id="psAvgFis"    class="ps-val"></div></div>
  </div>
  <div id="portfolioTable" class="portfolio-table-wrap">
    <div class="pt-placeholder">불러오는 중…</div>
  </div>
</main>
<div id="addModal" class="modal hidden">
  <div class="modal-card">
    <div class="modal-header">
      <span id="modalTitle">종목 추가</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="mf-row">
        <label>종목 검색</label>
        <div style="position:relative">
          <input id="modalSearchInput" type="text" placeholder="종목명 또는 티커…" autocomplete="off">
          <div id="modalSearchDrop" class="search-dropdown hidden"></div>
        </div>
      </div>
      <div class="mf-row"><label>티커</label>      <input id="mTicker"   type="text"   readonly placeholder="자동 입력"></div>
      <div class="mf-row"><label>수량</label>      <input id="mQty"      type="number" min="0" placeholder="0"></div>
      <div class="mf-row"><label>평균 매수가</label><input id="mAvgPrice" type="number" min="0" step="any" placeholder="0"></div>
      <div class="mf-row"><label>메모</label>      <input id="mMemo"     type="text"   placeholder="선택사항"></div>
    </div>
    <div class="modal-footer">
      <button class="modal-cancel" onclick="closeModal()">취소</button>
      <button class="modal-save"   onclick="savePosition()">저장</button>
    </div>
  </div>
</div>
<div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal()"></div>
<script type="module" src="js/mypage.js"></script>
</body>
</html>
